<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WaterMiu</title>
<style>
  :root { --bg:#fafafa; --card:#fff; --line:#e5e5e5; --text:#222; --muted:#888; --accent:#ff6b9d; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); }
  header { padding:24px 32px 12px; border-bottom:1px solid var(--line); background:var(--card); position:sticky; top:0; z-index:10; }
  .header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  h1 { margin:0; font-size:22px; }
  .pub-btn { padding:8px 16px; border:none; background:var(--accent); color:#fff; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; }
  .pub-btn:hover { opacity:.9; }
  .search-box { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .search-box input { flex:1; padding:8px 14px; border:1px solid var(--line); border-radius:20px; font-size:14px; outline:none; font-family:inherit; background:var(--bg); }
  .search-box input:focus { border-color:var(--accent); }
  .search-box .search-clear { display:none; padding:4px 10px; border:none; background:none; cursor:pointer; color:var(--muted); font-size:16px; }
  .search-box .search-clear.visible { display:inline-block; }
  #tags { display:flex; flex-wrap:wrap; gap:8px; }
  .tag-btn { padding:6px 14px; border:1px solid var(--line); border-radius:20px; background:#fff; cursor:pointer; font-size:13px; transition:all .15s; }
  .tag-btn:hover { border-color:var(--accent); }
  .tag-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  #grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:16px; padding:20px 32px 60px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; transition:transform .15s, box-shadow .15s; display:flex; flex-direction:column; }
  .card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,.08); }
  .thumb { width:100%; aspect-ratio:1/1; object-fit:cover; background:#eee; }
  .meta { padding:10px 12px 12px; }
  .card-tag { display:inline-block; font-size:11px; color:var(--accent); background:#fff0f5; padding:2px 8px; border-radius:10px; margin-bottom:6px; }
  .card-title { font-size:14px; font-weight:600; line-height:1.35; margin:0 0 4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-date { font-size:11px; color:var(--muted); }
  .badge { float:right; font-size:11px; color:var(--muted); }
  #modal, #pubModal, #editModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100; overflow-y:auto; }
  #modal.open, #pubModal.open, #editModal.open { display:block; }
  .modal-inner { max-width:900px; margin:40px auto; background:#fff; border-radius:12px; padding:28px 32px; }
  .pub-inner { max-width:640px; }
  .close { float:right; font-size:24px; cursor:pointer; color:#666; border:none; background:none; }
  .close:hover { color:#000; }
  .m-tag { display:inline-block; font-size:12px; color:#fff; background:var(--accent); padding:3px 10px; border-radius:12px; }
  .m-title { font-size:22px; margin:10px 0 4px; }
  .m-date { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .m-body { white-space:pre-wrap; line-height:1.7; font-size:14px; color:#333; padding:14px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-bottom:18px; }
  .m-images { display:flex; flex-direction:column; gap:12px; }
  .m-images img { width:100%; border-radius:6px; }
  .empty { padding:60px; text-align:center; color:var(--muted); grid-column:1/-1; }
  .pub-form { display:flex; flex-direction:column; gap:14px; margin-top:8px; }
  .pub-form label { font-size:13px; font-weight:600; color:#444; display:block; margin-bottom:6px; }
  .pub-form input[type=text], .pub-form input[type=password], .pub-form select, .pub-form textarea {
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; outline:none; font-family:inherit;
  }
  .pub-form input:focus, .pub-form textarea:focus, .pub-form select:focus { border-color:var(--accent); }
  .pub-form textarea { min-height:120px; resize:vertical; }
  .pub-form input[type=file] { font-size:13px; }
  .pub-preview { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .pub-preview img { width:80px; height:80px; object-fit:cover; border-radius:6px; border:1px solid var(--line); }
  .pub-submit { background:var(--accent); color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  .pub-submit:disabled { opacity:.5; cursor:not-allowed; }
  .pub-msg { font-size:13px; min-height:18px; }
  .pub-msg.err { color:#d33; }
  .pub-msg.ok { color:#2a8; }
  .hint { font-size:12px; color:var(--muted); }
  .detail-actions { margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
  .detail-edit-btn { width:100%; background:var(--accent); color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  .edit-image-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(92px, 1fr)); gap:10px; margin-top:8px; }
  .edit-image-tile { position:relative; aspect-ratio:1/1; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#f7f7f7; }
  .edit-image-tile img { width:100%; height:100%; object-fit:cover; display:block; }
  .image-remove { position:absolute; inset:0; width:100%; height:100%; padding:0; border:none; appearance:none; background:rgba(0,0,0,.18); color:#fff; font-size:46px; line-height:1; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; text-shadow:0 2px 8px rgba(0,0,0,.65); }
  .image-remove:hover { background:rgba(0,0,0,.28); }
  .image-add { display:flex; align-items:center; justify-content:center; border:1px dashed var(--accent); color:var(--accent); font-size:30px; font-weight:300; cursor:pointer; }
  .image-add input { display:none; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>WaterMiu <span class="badge" id="count"></span></h1>
    <button class="pub-btn" onclick="openPublish()">+ 发布</button>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索标题或内容..." oninput="onSearch()">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
  <div id="tags"></div>
</header>
<div id="grid"></div>

<div id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal-inner">
    <button class="close" onclick="closeModal()">×</button>
    <div id="m-content"></div>
  </div>
</div>

<div id="pubModal" onclick="if(event.target.id==='pubModal')closePublish()">
  <div class="modal-inner pub-inner">
    <button class="close" onclick="closePublish()">×</button>
    <h2 style="margin:0 0 4px;font-size:20px">发布新条目</h2>
    <p class="hint">提交后约 1-2 分钟后上线（Cloudflare 自动重新部署）</p>
    <form class="pub-form" onsubmit="event.preventDefault();submitPublish()">
      <div>
        <label>分类</label>
        <select id="f-tag"></select>
      </div>
      <div>
        <label>标题</label>
        <input id="f-title" type="text" placeholder="例如：辉夜大小姐想让我表白" required>
      </div>
      <div>
        <label>正文（可填评分等）</label>
        <textarea id="f-body" placeholder="例如：8.5分&#10;非常好看..."></textarea>
      </div>
      <div>
        <label>图片（可多选）</label>
        <input id="f-images" type="file" accept="image/*" multiple>
        <div class="pub-preview" id="f-preview"></div>
      </div>
      <div>
        <label>发布密码</label>
        <input id="f-pw" type="password" required>
      </div>
      <button type="submit" class="pub-submit" id="f-submit">发布</button>
      <div class="pub-msg" id="f-msg"></div>
    </form>
  </div>
</div>

<div id="editModal" onclick="if(event.target.id==='editModal')closeEdit()">
  <div class="modal-inner pub-inner">
    <button class="close" onclick="closeEdit()">×</button>
    <h2 style="margin:0 0 4px;font-size:20px">修改条目</h2>
    <form class="pub-form" onsubmit="event.preventDefault();submitEdit()">
      <div>
        <label>分类</label>
        <input id="e-tag" type="text" required>
      </div>
      <div>
        <label>标题</label>
        <input id="e-title" type="text" required>
      </div>
      <div>
        <label>正文</label>
        <textarea id="e-body"></textarea>
      </div>
      <div>
        <label>图片</label>
        <div class="edit-image-grid" id="e-image-grid"></div>
      </div>
      <div>
        <label>修改密码</label>
        <input id="e-pw" type="password" required>
      </div>
      <button type="submit" class="pub-submit" id="e-submit">保存修改</button>
      <div class="pub-msg" id="e-msg"></div>
    </form>
  </div>
</div>

<script>
let DATA = [];
let activeTag = "全部";
let tags = [];
let searchQuery = "";
let currentEditIndex = null;
let editKeepImages = [];
let editNewImages = [];
let editNewImageUrls = [];

function esc(s){return (s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function load(){
  const r = await fetch('data.json?t=' + Date.now());
  DATA = await r.json();
  refreshTags();
  renderTags(); render(); populateTagSelect();
}

function refreshTags(){
  tags = ["全部", ...Array.from(new Set(DATA.map(d=>d.tag)))];
  if (!tags.includes(activeTag)) activeTag = "全部";
}

function render(){
  const grid = document.getElementById('grid');
  let list = activeTag==="全部" ? DATA : DATA.filter(d=>d.tag===activeTag);
  if (searchQuery) list = list.filter(d => (d.title||'').toLowerCase().includes(searchQuery) || (d.body||'').toLowerCase().includes(searchQuery));
  document.getElementById('count').textContent = `共 ${list.length} 条`;
  if (!list.length){ grid.innerHTML = '<div class="empty">空</div>'; return; }
  grid.innerHTML = list.map(d=>`
    <div class="card" onclick="openItem(${DATA.indexOf(d)})">
      <img class="thumb" loading="lazy" src="${esc(d.images[0]||'')}" alt="">
      <div class="meta">
        <span class="card-tag">${esc(d.tag)}</span>
        ${d.images.length>1?`<span class="badge">+${d.images.length-1}</span>`:''}
        <h3 class="card-title">${esc(d.title||'(无标题)')}</h3>
        <div class="card-date">${esc(d.date.slice(0,10))}</div>
      </div>
    </div>
  `).join('');
}

function renderTags(){
  document.getElementById('tags').innerHTML = tags.map(t=>
    `<button class="tag-btn${t===activeTag?' active':''}" onclick="setTag('${esc(t)}')">${esc(t)}</button>`
  ).join('');
}
function setTag(t){ activeTag=t; renderTags(); render(); }

function openItem(i){
  const d = DATA[i];
  const body = d.body || "";
  document.getElementById('m-content').innerHTML = `
    <span class="m-tag">${esc(d.tag)}</span>
    <h2 class="m-title">${esc(d.title||'(无标题)')}</h2>
    <div class="m-date">${esc(d.date)}</div>
    ${body?`<div class="m-body">${esc(body)}</div>`:''}
    <div class="m-images">${d.images.map(u=>`<img src="${esc(u)}" loading="lazy">`).join('')}</div>
    <div class="detail-actions">
      <button class="detail-edit-btn" onclick="openEdit(${i})">修改</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
window.closeModal = function(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
};
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closeModal();closePublish();closeEdit();} });

function populateTagSelect(){
  const known = tags.filter(t=>t!=="全部");
  const sel = document.getElementById('f-tag');
  sel.innerHTML = known.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('') + '<option value="__new__">+ 新建分类</option>';
}

function openPublish(){
  document.getElementById('pubModal').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('f-msg').textContent='';
}
function closePublish(){
  document.getElementById('pubModal').classList.remove('open');
  document.body.style.overflow='';
}

function openEdit(i){
  const d = DATA[i];
  currentEditIndex = i;
  editKeepImages = [...(d.images || [])];
  editNewImages = [];
  editNewImageUrls.forEach(u=>URL.revokeObjectURL(u));
  editNewImageUrls = [];
  document.getElementById('e-tag').value = d.tag || '';
  document.getElementById('e-title').value = d.title || '';
  document.getElementById('e-body').value = d.body || '';
  document.getElementById('e-pw').value = '';
  const msg = document.getElementById('e-msg');
  msg.className = 'pub-msg';
  msg.textContent = '';
  renderEditImages();
  closeModal();
  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeEdit(){
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow='';
}

function renderEditImages(){
  const grid = document.getElementById('e-image-grid');
  const oldTiles = editKeepImages.map((src, idx)=>`
    <div class="edit-image-tile">
      <img src="${esc(src)}" alt="">
      <button type="button" class="image-remove" onclick="removeEditImage(${idx})">×</button>
    </div>
  `).join('');
  const newTiles = editNewImages.map((item, idx)=>`
    <div class="edit-image-tile">
      <img src="${esc(item.url)}" alt="">
      <button type="button" class="image-remove" onclick="removeNewEditImage(${idx})">×</button>
    </div>
  `).join('');
  grid.innerHTML = oldTiles + newTiles + `
    <label class="edit-image-tile image-add" title="添加图片">
      <span>+</span>
      <input type="file" accept="image/*" multiple onchange="addEditImages(this.files); this.value='';">
    </label>
  `;
}

function removeEditImage(idx){
  editKeepImages.splice(idx, 1);
  renderEditImages();
}

function removeNewEditImage(idx){
  const item = editNewImages.splice(idx, 1)[0];
  if (item) URL.revokeObjectURL(item.url);
  renderEditImages();
}

function addEditImages(files){
  for (const file of files || []){
    const url = URL.createObjectURL(file);
    editNewImages.push({ file, url });
    editNewImageUrls.push(url);
  }
  renderEditImages();
}

document.getElementById('f-images').addEventListener('change', e=>{
  const prev = document.getElementById('f-preview');
  prev.innerHTML='';
  for (const file of e.target.files){
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    prev.appendChild(img);
  }
});

document.getElementById('f-tag').addEventListener('change', e=>{
  if (e.target.value === '__new__'){
    const t = prompt('新分类名称（2-4 字）');
    if (t && t.trim()){
      const opt = document.createElement('option');
      opt.value = opt.textContent = t.trim();
      e.target.insertBefore(opt, e.target.lastElementChild);
      e.target.value = t.trim();
    } else {
      e.target.selectedIndex = 0;
    }
  }
});

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const s = reader.result;
      resolve(s.substring(s.indexOf(',')+1));
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitPublish(){
  const btn = document.getElementById('f-submit');
  const msg = document.getElementById('f-msg');
  msg.className = 'pub-msg';
  msg.textContent = '准备中...';
  btn.disabled = true;
  try {
    const tag = document.getElementById('f-tag').value;
    const title = document.getElementById('f-title').value.trim();
    const body = document.getElementById('f-body').value;
    const pw = document.getElementById('f-pw').value;
    const files = document.getElementById('f-images').files;
    if (!tag || tag === '__new__') throw new Error('请选择分类');
    if (!title) throw new Error('请填标题');
    msg.textContent = '上传中...';
    const images = [];
    for (const f of files){
      const ext = (f.name.split('.').pop() || 'jpg').toLowerCase();
      images.push({ ext: ext.replace(/[^a-z0-9]/g,'') || 'jpg', data: await fileToBase64(f) });
    }
    const r = await fetch('/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, tag, title, body, images })
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error || ('HTTP ' + r.status));
    msg.className = 'pub-msg ok';
    msg.textContent = '发布成功！约 1-2 分钟后刷新页面可见。';
    document.getElementById('f-title').value='';
    document.getElementById('f-body').value='';
    document.getElementById('f-images').value='';
    document.getElementById('f-preview').innerHTML='';
    document.getElementById('f-pw').value='';
  } catch (e) {
    msg.className = 'pub-msg err';
    msg.textContent = '失败：' + e.message;
  } finally {
    btn.disabled = false;
  }
}

async function submitEdit(){
  if (currentEditIndex === null) return;
  const d = DATA[currentEditIndex];
  const btn = document.getElementById('e-submit');
  const msg = document.getElementById('e-msg');
  msg.className = 'pub-msg';
  msg.textContent = '保存中...';
  btn.disabled = true;
  try {
    const tag = document.getElementById('e-tag').value.trim();
    const title = document.getElementById('e-title').value.trim();
    const body = document.getElementById('e-body').value;
    const password = document.getElementById('e-pw').value;
    if (!tag) throw new Error('请填写分类');
    if (!title) throw new Error('请填写标题');

    const images = [];
    for (const item of editNewImages){
      const f = item.file;
      const ext = (f.name.split('.').pop() || 'jpg').toLowerCase();
      images.push({ ext: ext.replace(/[^a-z0-9]/g,'') || 'jpg', data: await fileToBase64(f) });
    }

    const r = await fetch('/edit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: d.id, password, tag, title, body, keepImages: editKeepImages, images })
    });
    const result = await r.json();
    if (!r.ok) throw new Error(result.error || ('HTTP ' + r.status));

    d.tag = tag;
    d.title = title;
    d.body = body.trim();
    d.images = Array.isArray(result.images) ? result.images : [...editKeepImages];
    refreshTags();
    renderTags();
    render();
    const nextIndex = currentEditIndex;
    closeEdit();
    openItem(nextIndex);
  } catch (e) {
    msg.className = 'pub-msg err';
    msg.textContent = '失败：' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function onSearch(){
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('visible');
  render();
}

load();
</script>
</body>
</html>
